<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="strand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3a9e56"/>
      <stop offset="100%" stop-color="#de8246"/>
    </linearGradient>
  </defs>
  <!-- background circle -->
  <circle cx="16" cy="16" r="15" fill="#f0f5f1"/>
  <!-- left backbone strand -->
  <path d="M11 4 C10 10, 12 14, 11 20 C10 24, 11 27, 11 28"
        fill="none" stroke="#3c4f3d" stroke-width="1.8" stroke-linecap="round"/>
  <!-- right backbone strand -->
  <path d="M21 4 C22 10, 20 14, 21 20 C22 24, 21 27, 21 28"
        fill="none" stroke="#3c4f3d" stroke-width="1.8" stroke-linecap="round"/>
  <!-- rungs -->
  <line x1="11" y1="8"  x2="21" y2="8"  stroke="url(#strand)" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="11" y1="13" x2="21" y2="13" stroke="url(#strand)" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="11" y1="18" x2="21" y2="18" stroke="url(#strand)" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="11" y1="23" x2="21" y2="23" stroke="url(#strand)" stroke-width="1.6" stroke-linecap="round"/>
</svg>
