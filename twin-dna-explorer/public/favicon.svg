<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a8ffb0"/>
      <stop offset="45%" stop-color="#3a9e56"/>
      <stop offset="100%" stop-color="#0d3a1a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6ab882" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- outer faint orbit ring -->
  <circle cx="16" cy="16" r="13.5" fill="none" stroke="#6ab882" stroke-width="0.4" stroke-dasharray="1.6 2.2" opacity="0.3"/>
  <!-- mid orbit ring -->
  <circle cx="16" cy="16" r="10" fill="none" stroke="#6ab882" stroke-width="0.55" opacity="0.45"/>
  <!-- inner glow halo -->
  <circle cx="16" cy="16" r="7.5" fill="url(#glow)" opacity="0.85"/>
  <!-- inner orbit ring -->
  <circle cx="16" cy="16" r="7" fill="none" stroke="#00e5ff" stroke-width="0.7" opacity="0.5"/>
  <!-- green core glow -->
  <circle cx="16" cy="16" r="4.5" fill="#1e6e38" opacity="0.9"/>
  <circle cx="16" cy="16" r="4.5" fill="url(#core)"/>
  <!-- core highlight -->
  <circle cx="14.8" cy="14.8" r="1.2" fill="#c8ffd0" opacity="0.45"/>
</svg>